<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Gallery</title>
    <meta name="description" content="A gallery of temples for the Church of Jesus Christ of Latter Day Saints.">
    <meta name="author" content="Joel Dadzie">
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <script src="scripts/temples.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Nunito:wght@400;600&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cinzel:wght@400..900&display=swap"
        rel="stylesheet">

</head>

<body>
    <header>
        <div class="header-top">
            <span id="temples">Temple Album</span>
            <button class="hamburger" aria-label="toggle navigation">☰</button>
        </div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Old</a>
            <a href="#">New</a>
            <a href="#">Large</a>
            <a href="#">Small</a>
        </nav>

    </header>
    <main>
        <h1>Home - LDS temples in Africa</h1>
        <div id="gallery">
            <figure>
                <img src="images/accra-ghana-temple.jpg" alt="Accra, Ghana, Temple">
                <figcaption>Accra Temple</figcaption>
            </figure>
            <figure>
                <img src="images/lagos-nigeria-temple.jpg" alt="Lagos Temple">
                <figcaption>Lagos Temple</figcaption>
            </figure>
            <figure>
                <img src="images/kumasi-ghana-temple.jpg" alt="Kumasi Temple">
                <figcaption>Kumasi Temple</figcaption>
            </figure>
            <figure>
                <img src="images/aba-nigeria-temple.jpg" alt="Aba, Nigeria, Temple">
                <figcaption>Aba, Nigeria, Temple</figcaption>
            </figure>
            <figure>
                <img src="images/abidjan-ivory-coast-temple.jpg" alt="Abidjan, Ivory Coast Temple">
                <figcaption>Abidjan, Ivory Coast Temple</figcaption>
            </figure>
            <figure>
                <img src="images/benin-city-nigeria-temple.jpg" alt="Benin City, Nigeria, Temple">
                <figcaption>Benin City, Nigeria, Temple</figcaption>
            </figure>
            <figure>
                <img src="images/kinshasa-democratic-republic-of-the-congo-temple.jpg"
                    alt="Kinshasa, Democratic Republic of the Congo, Temple">
                <figcaption>Kinshasa, Democratic Republic of the Congo, Temple</figcaption>
            </figure>
            <figure>
                <img src="images/lubumbashi-democratic-republic-of-the-congo-temple.jpg"
                    alt="Lubumbashi, Democratic Republic of the Congo, Temple">
                <figcaption>Lubumbashi, Democratic Republic of the Congo, Temple</figcaption>
            </figure>
            <figure>
                <img src="images/nairobi-kenya-temple.jpg" alt="Nairobi, Kenya, Temple">
                <figcaption>Nairobi, Kenya, Temple</figcaption>
            </figure>
        </div>

    </main>
    <footer>
        <p>
            &copy;
            <span id="currentyear"></span>
            Joel Dadzie | Ghana
        </p>
        <p id="lastModified"></p>
    </footer>

</body>

</html>
